<body class="cyworld-page">
    <div class="cyworld-layout">

            </div>
            <hr>
            <b class="color-blue">누가</b><span style="color: #b3b3b3; font-size: 12px;">&nbsp;(<i class="fa fa-mars-stroke-v"></i>)</span>
            <div style="margin-top: 15px;">
              <select id="wave-select" style="width: 100%">
                <option value="">파도타기</option>
                <option value="https://www.instagram.com/nugabox/">누가(@nugabox)</option>
                <option value="https://www.instagram.com/la.song2/">송이(@la.song2)</option>
              </select>
            </div>
            </div>
        </div>
        </div>
        <div class="outer-box border-right-box" style="width: 72%; padding: 20px 20px 20px 0px">
        <div class="inner-box" style="padding: 10px 10px 10px 5px;">
            <div class="content-box-header">
            <h1 style="margin:0px; font-size: 1.3em; font-weight: 550;" class="color-blue">&nbsp;&nbsp;누가의 미니홈피 😆</h1>
            <span id="cyworld-url" style="font-size: 12px;"></span>
            </div>
            <div class="content-box" style="box-shadow: 5px 5px 20px -10px grey; padding: 10px 20px;">
            <div style="display: flex; font-size: 14px;">
                <div class="col" style="display: flex; flex-direction: column;">
                <span class="content-title">최근 게시물</span>
                <hr style="margin-block-end: 0px; width: 100%;">
                <div class="flex-middle" style="color: #999; background: rgb(248, 248, 248)">순간이 담긴 사진을<br>친구들과 함께 나눠보세요</div>
                </div>
                <div class="col" style="padding-bottom: 5px">
                <span class="content-title" style="color: #fff;">더미</span>
                <hr class="dashed">
                <div class="row">
                    <div class="col">
                    &nbsp;다이어리&nbsp;&nbsp;<span class="board-count">1/37</span>
                    </div>
                    <div class="col">
                    &nbsp;사진첩&nbsp;&nbsp;<span class="board-count">25/99</span>
                    </div>
                </div>
                <hr class="dashed">
                <div class="row">
                    <div class="col">
                    &nbsp;게시판&nbsp;&nbsp;<span class="board-count">3/13</span>
                    </div>
                    <div class="col">
                    &nbsp;동영상&nbsp;&nbsp;<span class="board-count">2/5</span>
                    </div>
                </div>
                <hr class="dashed">
                <div class="row">
                    <div class="col">
                    &nbsp;방명록&nbsp;&nbsp;<span class="board-count">74/125</span>
                    </div>
                </div>
                </div>
            </div>
            <div style="margin-top: 20px;">
                <span class="content-title">미니룸 <span style="color: #ccc">| 스토리룸</span></span>
                <hr style="margin-block-end: 0px; width: 100%; margin-bottom: 5px;">
                <img style="width: 100%; height: 300px; object-fit: cover;" src="images/miniroom7.webp"></img>
            </div>
            <div class="menu-item menu-selected" onclick="handleClickMenu(this)">홈</div>
            <div class="menu-item" style="top: 48px" onclick="handleClickMenu(this)">프로필</div>
            <div class="menu-item" style="top: 86px" onclick="handleClickMenu(this)">다이어리</div>
            </div>
        </div>
        </div>
    </div>
    <script>
      (function () {
        const todayEl = document.getElementById('today-count');
        const totalEl = document.getElementById('total-count');
        if (!todayEl || !totalEl) return;

        const KEY_DATE = 'cyworld_today_date';
        const KEY_TODAY = 'cyworld_today_count';
        const KEY_TOTAL = 'cyworld_total_count';
        const DEFAULT_TODAY = 1;
        const DEFAULT_TOTAL = 824;

        const now = new Date();
        const today = [
          now.getFullYear(),
          String(now.getMonth() + 1).padStart(2, '0'),
          String(now.getDate()).padStart(2, '0'),
        ].join('-');

        const savedDate = localStorage.getItem(KEY_DATE);
        let todayCount = Number(localStorage.getItem(KEY_TODAY) || '0');
        let totalCount = localStorage.getItem(KEY_TOTAL);

        if (savedDate !== today) {
          todayCount = DEFAULT_TODAY;
          localStorage.setItem(KEY_DATE, today);
        } else {
          todayCount = todayCount + 1;
        }

        if (totalCount === null) {
          totalCount = DEFAULT_TOTAL;
        } else {
          totalCount = Number(totalCount) + 1;
        }

        localStorage.setItem(KEY_TODAY, String(todayCount));
        localStorage.setItem(KEY_TOTAL, String(totalCount));

        todayEl.textContent = String(todayCount);
        totalEl.textContent = String(totalCount);
      })();
    </script>
    <script src="js/main.js"></script>
</body>
</html>
